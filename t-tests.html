  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo, useCallback, useLayoutEffect, Fragment } = React;

    /* ============================================================
       MATH UTILITIES
       ============================================================ */

    // Lanczos approximation for log-gamma
    function lgamma(x) {
      const g = 7;
      const c = [
        0.99999999999980993, 676.5203681218851, -1259.1392167224028,
        771.32342877765313, -176.61502916214059, 12.507343278686905,
        -0.13857109526572012, 9.9843695780195716e-6, 1.5056327351493116e-7
      ];
      if (x < 0.5) {
        return Math.log(Math.PI / Math.sin(Math.PI * x)) - lgamma(1 - x);
      }
      x -= 1;
      let a = c[0];
      const t = x + g + 0.5;
      for (let i = 1; i < 9; i++) a += c[i] / (x + i);
      return 0.5 * Math.log(2 * Math.PI) + (x + 0.5) * Math.log(t) - t + Math.log(a);
    }

    // Continued fraction for incomplete beta (Numerical Recipes)
    function betacf(a, b, x) {
      const MAX_IT = 200, EPS = 3e-7, FPMIN = 1e-30;
      const qab = a + b, qap = a + 1, qam = a - 1;
      let c = 1, d = 1 - qab * x / qap;
      if (Math.abs(d) < FPMIN) d = FPMIN;
      d = 1 / d;
      let h = d;
      for (let m = 1; m <= MAX_IT; m++) {
        const m2 = 2 * m;
        let aa = m * (b - m) * x / ((qam + m2) * (a + m2));
        d = 1 + aa * d; if (Math.abs(d) < FPMIN) d = FPMIN;
        c = 1 + aa / c; if (Math.abs(c) < FPMIN) c = FPMIN;
        d = 1 / d; h *= d * c;
        aa = -(a + m) * (qab + m) * x / ((a + m2) * (qap + m2));
        d = 1 + aa * d; if (Math.abs(d) < FPMIN) d = FPMIN;
        c = 1 + aa / c; if (Math.abs(c) < FPMIN) c = FPMIN;
        d = 1 / d;
        const del = d * c; h *= del;
        if (Math.abs(del - 1) < EPS) break;
      }
      return h;
    }

    // Regularized incomplete beta I_x(a, b)
    function incompleteBeta(a, b, x) {
      if (x <= 0) return 0;
      if (x >= 1) return 1;
      const lbeta = lgamma(a + b) - lgamma(a) - lgamma(b);
      const front = Math.exp(Math.log(x) * a + Math.log(1 - x) * b + lbeta) / a;
      if (x < (a + 1) / (a + b + 2)) {
        return front * betacf(a, b, x);
      }
      return 1 - Math.exp(Math.log(1 - x) * b + Math.log(x) * a + lbeta - Math.log(b)) * betacf(b, a, 1 - x);
    }

    // CDF of t-distribution
    function tCdf(t, df) {
      if (!isFinite(t) || !isFinite(df) || df <= 0) return NaN;
      const x = df / (df + t * t);
      const ib = incompleteBeta(df / 2, 0.5, x);
      return t >= 0 ? 1 - 0.5 * ib : 0.5 * ib;
    }

    // PDF of t-distribution (normalized)
    function tPdf(t, df) {
      const lp = lgamma((df + 1) / 2) - lgamma(df / 2) - 0.5 * Math.log(Math.PI * df)
        - ((df + 1) / 2) * Math.log(1 + (t * t) / df);
      return Math.exp(lp);
    }

    function pValue(t, df, sided) {
      if (!isFinite(t) || !isFinite(df) || df <= 0) return NaN;
      const tail = 1 - tCdf(Math.abs(t), df);
      if (sided === 'two') return 2 * tail;
      if (sided === 'right') return t >= 0 ? tail : 1 - tail;
      // left
      return t <= 0 ? tail : 1 - tail;
    }

    function critical(alpha, df, sided) {
      // bisection: find t such that P(T > t) == alpha (right) or alpha/2 (two-sided)
      const target = sided === 'two' ? alpha / 2 : alpha;
      let lo = 0, hi = 50;
      for (let i = 0; i < 80; i++) {
        const mid = (lo + hi) / 2;
        const p = 1 - tCdf(mid, df);
        if (p > target) lo = mid; else hi = mid;
      }
      return (lo + hi) / 2;
    }

    // Test statistic helpers
    function oneMeanStats({ xbar, mu0, s, n }) {
      const df = n - 1;
      const se = s / Math.sqrt(n);
      const t = (xbar - mu0) / se;
      return { t, df, se };
    }
    function pooledStats({ xbar1, s1, n1, xbar2, s2, n2 }) {
      const df = n1 + n2 - 2;
      const sp2 = ((n1 - 1) * s1 * s1 + (n2 - 1) * s2 * s2) / df;
      const sp = Math.sqrt(sp2);
      const se = sp * Math.sqrt(1 / n1 + 1 / n2);
      const t = (xbar1 - xbar2) / se;
      return { t, df, se, sp };
    }
    function welchStats({ xbar1, s1, n1, xbar2, s2, n2 }) {
      const v1 = (s1 * s1) / n1;
      const v2 = (s2 * s2) / n2;
      const se = Math.sqrt(v1 + v2);
      const num = (v1 + v2) * (v1 + v2);
      const den = (v1 * v1) / (n1 - 1) + (v2 * v2) / (n2 - 1);
      const df = num / den;
      const t = (xbar1 - xbar2) / se;
      return { t, df, se };
    }
    function pairedStats({ before, after }) {
      const n = before.length;
      const d = before.map((b, i) => after[i] - b);
      const dbar = d.reduce((a, x) => a + x, 0) / n;
      const sd = Math.sqrt(d.reduce((a, x) => a + (x - dbar) * (x - dbar), 0) / (n - 1));
      const se = sd / Math.sqrt(n);
      const t = dbar / se;
      return { t, df: n - 1, se, dbar, sd, n };
    }
    function indepStats({ a, b }) {
      const m = (arr) => arr.reduce((s, x) => s + x, 0) / arr.length;
      const v = (arr, mean) => arr.reduce((s, x) => s + (x - mean) ** 2, 0) / (arr.length - 1);
      const ma = m(a), mb = m(b);
      const sa = Math.sqrt(v(a, ma)), sb = Math.sqrt(v(b, mb));
      return welchStats({ xbar1: ma, s1: sa, n1: a.length, xbar2: mb, s2: sb, n2: b.length });
    }

    function fmt(x, d = 3) {
      if (!isFinite(x)) return '—';
      if (Math.abs(x) < 1e-4 && x !== 0) return x.toExponential(2);
      return x.toFixed(d);
    }

    /* ============================================================
       PRIMITIVES
       ============================================================ */

    function Reveal({ children, delay = 0, as: Tag = 'div', className = '' }) {
      const ref = useRef(null);
      const [v, setV] = useState(false);
      useEffect(() => {
        const node = ref.current;
        if (!node) return;
        const o = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { setV(true); o.disconnect(); }
        }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
        o.observe(node);
        return () => o.disconnect();
      }, []);
      return (
        <Tag ref={ref} className={`reveal ${v ? 'visible' : ''} ${className}`} style={{ transitionDelay: `${delay}s` }}>
          {children}
        </Tag>
      );
    }

    function Tex({ tex, block = false, className = '' }) {
      const ref = useRef(null);
      useLayoutEffect(() => {
        if (ref.current && window.katex) {
          try {
            window.katex.render(tex, ref.current, { displayMode: block, throwOnError: false, output: 'html' });
          } catch (e) { ref.current.textContent = tex; }
        }
      }, [tex, block]);
      return <span ref={ref} className={className} />;
    }

    function FormulaSweep({ tex, className = '', delay = 0 }) {
      const ref = useRef(null);
      const [swept, setSwept] = useState(false);
      useEffect(() => {
        const node = ref.current;
        if (!node) return;
        const o = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) {
            setTimeout(() => setSwept(true), delay * 1000);
            o.disconnect();
          }
        }, { threshold: 0.4 });
        o.observe(node);
        return () => o.disconnect();
      }, [delay]);
      return (
        <div ref={ref} className={`formula-sweep ${swept ? 'swept' : ''} ${className}`}>
          <Tex tex={tex} block className="tex-large block" />
        </div>
      );
    }

    function useCountUp(target, duration = 700) {
      const [value, setValue] = useState(target);
      const fromRef = useRef(target);
      const startRef = useRef(null);
      useEffect(() => {
        const from = fromRef.current;
        if (!isFinite(target) || !isFinite(from)) { setValue(target); fromRef.current = target; return; }
        let raf;
        startRef.current = performance.now();
        const tick = (now) => {
          const t = Math.min(1, (now - startRef.current) / duration);
          const eased = 1 - Math.pow(1 - t, 3);
          setValue(from + (target - from) * eased);
          if (t < 1) raf = requestAnimationFrame(tick);
          else fromRef.current = target;
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [target, duration]);
      return value;
    }

    function AnimatedNumber({ value, decimals = 3, className = '' }) {
      const v = useCountUp(value);
      return <span className={className}>{fmt(v, decimals)}</span>;
    }

    /* ============================================================
       NAVIGATION
       ============================================================ */

    const SECTIONS = [
      { id: 'overview', label: 'Overview' },
      { id: 'guide', label: 'Decide' },
      { id: 'one-mean', label: 'One-mean' },
      { id: 'paired', label: 'Paired' },
      { id: 'pooled', label: 'Pooled' },
      { id: 'welch', label: 'Welch' },
      { id: 'lab', label: 'Live lab' },
      { id: 'compare', label: 'Compare' },
      { id: 'pitfalls', label: 'Pitfalls' }
    ];

    function ThemeToggle() {
      const [theme, setTheme] = useState(() =>

    function HeroCurve() {
      // Two overlapping bell-ish curves that gently shift over time
      const [phase, setPhase] = useState(0);
      useEffect(() => {
        let raf;
        let start = performance.now();
        const tick = (now) => {
          setPhase((now - start) / 8000);
          raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, []);
      const W = 1200, H = 520;
      const path = (offset, scale) => {
        const pts = [];
        for (let i = 0; i <= 200; i++) {
          const x = i / 200;
          const u = (x - 0.5) * 8 + Math.sin(phase + offset) * 0.4;
          const y = Math.exp(-u * u / 2) * scale;
          pts.push([x * W, H - y * H * 0.65 - 60]);
        }
        return 'M' + pts.map(p => p.join(',')).join('L');
      };
      return (
        <svg className="hero-curve" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
          <defs>
            <linearGradient id="heroGrad1" x1="0" x2="1" y1="0" y2="0">
              <stop offset="0%" stopColor="#7C5CFF" stopOpacity="0" />
              <stop offset="50%" stopColor="#7C5CFF" stopOpacity="0.7" />
              <stop offset="100%" stopColor="#FF7A59" stopOpacity="0" />

              <stop offset="0%" stopColor="#FF7A59" stopOpacity="0" />
              <stop offset="50%" stopColor="#A88BFF" stopOpacity="0.45" />
              <stop offset="100%" stopColor="#7C5CFF" stopOpacity="0" />
            </linearGradient>
          </defs>
          <path d={path(0, 1)} stroke="url(#heroGrad1)" strokeWidth="1.6" fill="none" />
          <path d={path(1.7, 0.85)} stroke="url(#heroGrad2)" strokeWidth="1.4" fill="none" />
          <path d={path(3.1, 0.7)} stroke="url(#heroGrad1)" strokeWidth="1" fill="none" opacity="0.6" />

    function TDistPlot({ t, df, sided, alpha = 0.05 }) {
      const W = 720, H = 280, padX = 40, padY = 20;
      const xRange = 5;
      const { points, maxY } = useMemo(() => {
        const N = 240;
        const arr = [];
        for (let i = 0; i <= N; i++) {
          const x = -xRange + (i / N) * 2 * xRange;
          arr.push({ x, y: tPdf(x, Math.max(1, df)) });
        }
        const m = Math.max(...arr.map(p => p.y));
        return { points: arr.map(p => ({ x: p.x, y: p.y / m })), maxY: m };
      }, [df]);

      const xToPx = (x) => padX + ((x + xRange) / (2 * xRange)) * (W - 2 * padX);
      const yToPx = (y) => H - padY - y * (H - 2 * padY);

      const curvePath = 'M' + points.map(p => `${xToPx(p.x)},${yToPx(p.y)}`).join(' L ');
      const fillPath = curvePath + ` L ${xToPx(xRange)},${yToPx(0)} L ${xToPx(-xRange)},${yToPx(0)} Z`;

      const tcrit = critical(alpha, Math.max(1, df), sided);

      const rejectPath = (() => {
        if (sided === 'two') {
          const right = points.filter(p => p.x >= tcrit);
          const left = points.filter(p => p.x <= -tcrit);
          const r = right.length ? 'M' + right.map(p => `${xToPx(p.x)},${yToPx(p.y)}`).join(' L ')
            + ` L ${xToPx(right[right.length-1].x)},${yToPx(0)} L ${xToPx(right[0].x)},${yToPx(0)} Z` : '';
          const l = left.length ? 'M' + left.map(p => `${xToPx(p.x)},${yToPx(p.y)}`).join(' L ')
            + ` L ${xToPx(left[left.length-1].x)},${yToPx(0)} L ${xToPx(left[0].x)},${yToPx(0)} Z` : '';
          return r + ' ' + l;
        }
        if (sided === 'right') {
          const right = points.filter(p => p.x >= tcrit);
          if (!right.length) return '';
          return 'M' + right.map(p => `${xToPx(p.x)},${yToPx(p.y)}`).join(' L ')
            + ` L ${xToPx(right[right.length-1].x)},${yToPx(0)} L ${xToPx(right[0].x)},${yToPx(0)} Z`;
        }
        const left = points.filter(p => p.x <= -tcrit);
        if (!left.length) return '';
        return 'M' + left.map(p => `${xToPx(p.x)},${yToPx(p.y)}`).join(' L ')
          + ` L ${xToPx(left[left.length-1].x)},${yToPx(0)} L ${xToPx(left[0].x)},${yToPx(0)} Z`;
      })();

      const tClamped = Math.max(-xRange + 0.05, Math.min(xRange - 0.05, t));
      const markerX = xToPx(tClamped);
      const markerY = yToPx(tPdf(tClamped, Math.max(1, df)) / maxY);

      return (
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full" role="img" aria-label="t-distribution plot">
          <defs>
            <linearGradient id="tDistGrad" x1="0" x2="1">
              <stop offset="0%" stopColor="#7C5CFF" />
              <stop offset="100%" stopColor="#FF7A59" />
            </linearGradient>
            <linearGradient id="rejectGrad" x1="0" x2="1">
              <stop offset="0%" stopColor="#FF7A59" />
              <stop offset="100%" stopColor="#7C5CFF" />
            </linearGradient>
          </defs>
          {/* x-axis ticks */}
          {[-4, -2, 0, 2, 4].map(v => (
            <g key={v}>
              <line x1={xToPx(v)} y1={H - padY} x2={xToPx(v)} y2={H - padY + 5} className="grid-line" />
              <text x={xToPx(v)} y={H - padY + 18} textAnchor="middle" className="axis-text">{v}</text>
            </g>
          ))}
          <line x1={padX} y1={H - padY} x2={W - padX} y2={H - padY} className="grid-line" />
          {/* fill under curve */}
          <path d={fillPath} className="curve-fill" style={{ transition: 'd .4s cubic-bezier(.22,1,.36,1)' }} />
          {/* rejection regions */}
          <path d={rejectPath} className="reject-fill" />
          {/* curve stroke */}
          <path d={curvePath} className="curve-stroke" />
          {/* t marker */}
          <line x1={markerX} y1={H - padY} x2={markerX} y2={markerY} className="marker-line" style={{ transition: 'x1 .35s cubic-bezier(.22,1,.36,1), x2 .35s cubic-bezier(.22,1,.36,1), y2 .35s cubic-bezier(.22,1,.36,1)' }} />
          <circle cx={markerX} cy={markerY} r="5" fill="var(--accent2)" stroke="var(--bg)" strokeWidth="2" style={{ transition: 'cx .35s cubic-bezier(.22,1,.36,1), cy .35s cubic-bezier(.22,1,.36,1)' }} />
          <text x={markerX} y={markerY - 12} textAnchor="middle" className="axis-text" fill="var(--accent2)">t = {fmt(t, 2)}</text>
        </svg>
      );
    }

    function Slider({ label, value, onChange, min, max, step, decimals = 1, suffix }) {
      return (
        <label className="block">
          <div className="flex items-baseline justify-between mb-2">
            <span className="font-mono text-[11px] small-caps text-mute">{label}</span>
            <span className="font-mono text-[13px] text-ink-strong">{fmt(value, decimals)}{suffix}</span>
          </div>
          <input type="range" min={min} max={max} step={step} value={value} onChange={e => onChange(Number(e.target.value))} />
        </label>
      );
    }

    function LiveLab() {
      const [type, setType] = useState('one-mean');
      const [sided, setSided] = useState('two');
      const [alpha, setAlpha] = useState(0.05);

      // one-mean state
      const [xbar, setXbar] = useState(102);
      const [mu0, setMu0] = useState(100);
      const [s, setS] = useState(8);
      const [n, setN] = useState(25);

      // two-sample state (used for pooled / welch / paired)
      const [xbar1, setXbar1] = useState(72);
      const [s1, setS1] = useState(9);
      const [n1, setN1] = useState(20);
      const [xbar2, setXbar2] = useState(67);
      const [s2, setS2] = useState(11);
      const [n2, setN2] = useState(22);

      // paired state — pre-baked dataset
      const pairedBefore = [78, 82, 65, 91, 73, 88, 70, 79];
      const [pairedAfter, setPairedAfter] = useState([85, 88, 70, 95, 78, 90, 76, 83]);

      const stats = useMemo(() => {
        if (type === 'one-mean') return oneMeanStats({ xbar, mu0, s, n });
        if (type === 'paired') return pairedStats({ before: pairedBefore, after: pairedAfter });
        if (type === 'pooled') return pooledStats({ xbar1, s1, n1, xbar2, s2, n2 });
        return welchStats({ xbar1, s1, n1, xbar2, s2, n2 });
      }, [type, xbar, mu0, s, n, xbar1, s1, n1, xbar2, s2, n2, pairedAfter]);

      const p = pValue(stats.t, stats.df, sided);
      const reject = p < alpha;

      const TYPES = [
        { v: 'one-mean', label: 'One-mean' },
        { v: 'paired', label: 'Paired' },
        { v: 'pooled', label: 'Pooled' },
        { v: 'welch', label: 'Welch' }
      ];
      const SIDES = [
        { v: 'two', label: 'Two-sided' },
        { v: 'right', label: 'Right' },
        { v: 'left', label: 'Left' }
      ];

      return (
        <section id="lab" className="section-anchor py-24 md:py-32 border-t border-rule grad-soft-bg">
          <div className="max-w-[1200px] mx-auto px-6 md:px-10">
            <SectionHeading n="06" kicker="Live lab" title="Move the inputs. Watch the curve." lede="The t-statistic, the rejection region, and the p-value all update together. Build intuition by playing — bigger sample sizes, smaller standard deviations, see what happens to p." />
            <Reveal delay={0.05}>
              <div className="mt-12 card-surface p-6 md:p-8">
                <div className="flex flex-wrap gap-3 items-center mb-6">
                  <div className="seg">
                    {TYPES.map(o => (
                      <button key={o.v} onClick={() => setType(o.v)} className={type === o.v ? 'active' : ''}>{o.label}</button>
                    ))}
                  </div>
                  <div className="seg">
                    {SIDES.map(o => (
                      <button key={o.v} onClick={() => setSided(o.v)} className={sided === o.v ? 'active' : ''}>{o.label}</button>
                    ))}
                  </div>
                  <label className="flex items-center gap-2 ml-auto">
                    <span className="font-mono text-[11px] small-caps text-mute">α</span>
                    <input type="number" step="0.01" min="0.001" max="0.5" value={alpha} onChange={e => setAlpha(Number(e.target.value) || 0.05)} className="w-20" />
                  </label>
                </div>
                <div className="grid lg:grid-cols-[1fr_1.4fr] gap-10">
                  {/* Inputs */}
                  <div className="space-y-5">
                    {type === 'one-mean' && (
                      <Fragment>
                        <Slider label="sample mean x̄" value={xbar} onChange={setXbar} min={80} max={120} step={0.1} decimals={1} />
                        <Slider label="hypothesized μ₀" value={mu0} onChange={setMu0} min={80} max={120} step={0.1} decimals={1} />
                        <Slider label="sample SD s" value={s} onChange={setS} min={1} max={25} step={0.1} decimals={1} />
                        <Slider label="sample size n" value={n} onChange={setN} min={3} max={150} step={1} decimals={0} />
                      </Fragment>
                    )}
                    {(type === 'pooled' || type === 'welch') && (
                      <div className="grid grid-cols-2 gap-x-5 gap-y-4">
                        <div className="col-span-2 font-mono text-[11px] small-caps text-mute">group 1</div>
                        <Slider label="x̄₁" value={xbar1} onChange={setXbar1} min={50} max={90} step={0.1} decimals={1} />
                        <Slider label="s₁" value={s1} onChange={setS1} min={1} max={25} step={0.1} decimals={1} />
                        <Slider label="n₁" value={n1} onChange={setN1} min={3} max={120} step={1} decimals={0} />
                        <div />
                        <div className="col-span-2 font-mono text-[11px] small-caps text-mute mt-2">group 2</div>
                        <Slider label="x̄₂" value={xbar2} onChange={setXbar2} min={50} max={90} step={0.1} decimals={1} />
                        <Slider label="s₂" value={s2} onChange={setS2} min={1} max={25} step={0.1} decimals={1} />
                        <Slider label="n₂" value={n2} onChange={setN2} min={3} max={120} step={1} decimals={0} />
                      </div>
                    )}
                    {type === 'paired' && (
                      <div className="space-y-3">
                        <div className="font-mono text-[11px] small-caps text-mute">pre-test → post-test (drag any "after" value)</div>
                        <div className="grid grid-cols-1 gap-2">
                          {pairedBefore.map((b, i) => (
                            <div key={i} className="flex items-center gap-3">
                              <span className="font-mono text-[12px] text-mute w-6">#{i + 1}</span>
                              <span className="font-mono text-[13px] text-ink/80 w-12">{b}</span>
                              <span className="text-mute">→</span>
                              <input type="range" min={50} max={110} step={1} value={pairedAfter[i]}
                                onChange={e => {
                                  const v = Number(e.target.value);
                                  setPairedAfter(arr => arr.map((x, j) => j === i ? v : x));
                                }} className="flex-1" />
                              <span className="font-mono text-[13px] text-ink-strong w-12 text-right">{pairedAfter[i]}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                  {/* Plot + readout */}
                  <div className="space-y-5">
                    <div className="rounded-xl bg-base-deep p-4 hairline">
                      <TDistPlot t={stats.t} df={stats.df} sided={sided} alpha={alpha} />
                    </div>
                    <div className="grid grid-cols-3 gap-3">
                      <Stat label="t-statistic" value={stats.t} decimals={3} />
                      <Stat label="df" value={stats.df} decimals={2} />
                      <Stat label="p-value" value={p} decimals={4} accent />
                    </div>
                    <div className={`p-4 rounded-xl hairline ${reject ? 'border-accent' : ''}`} style={reject ? { borderColor: 'var(--accent)' } : {}}>
                      <div className="flex items-center gap-2 mb-1">
                        <span className={`chip ${reject ? 'ok' : 'warn'}`}>{reject ? 'Reject H₀' : 'Fail to reject H₀'}</span>
                        <span className="font-mono text-[11px] text-mute">at α = {alpha}</span>
                      </div>
                      <div className="text-[13.5px] text-ink/85">
                        {reject
                          ? `The observed difference is unlikely under H₀ (p ≈ ${fmt(p, 4)}). The data give us reason to doubt the null.`
                          : `The observed difference is consistent with chance under H₀ (p ≈ ${fmt(p, 4)}). Not enough evidence to reject the null.`}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </Reveal>
          </div>
        </section>
      );
    }

    function Stat({ label, value, decimals, accent }) {
      return (
        <div className="card-surface p-4">
          <div className="font-mono text-[11px] small-caps text-mute mb-1">{label}</div>
          <div className={`font-display text-[28px] leading-none ${accent ? 'grad-text' : 'text-ink-strong'}`}>
            <AnimatedNumber value={value} decimals={decimals} />
          </div>
        </div>
      );
    }

    /* ============================================================
       POOLED VS WELCH
       ============================================================ */

    function PooledVsWelch() {
      const [xbar1, setXbar1] = useState(72);
      const [s1, setS1] = useState(8);
      const [n1, setN1] = useState(15);
      const [xbar2, setXbar2] = useState(67);
      const [s2, setS2] = useState(18);
      const [n2, setN2] = useState(15);
      const pooled = pooledStats({ xbar1, s1, n1, xbar2, s2, n2 });
      const welch = welchStats({ xbar1, s1, n1, xbar2, s2, n2 });
      const pP = pValue(pooled.t, pooled.df, 'two');
      const pW = pValue(welch.t, welch.df, 'two');
      const dfDiverge = Math.abs(pooled.df - welch.df) / pooled.df > 0.10;
      const sdRatio = Math.max(s1, s2) / Math.min(s1, s2);
      return (
        <Reveal>
          <div className="mt-12 card-surface p-6 md:p-8">
            <div className="font-mono text-[11px] small-caps text-mute mb-3">side-by-side</div>
            <h3 className="font-display text-[34px] mb-4">Pooled vs. Welch — when do they disagree?</h3>
            <p className="text-[15px] text-ink/80 max-w-[68ch] mb-8">
              Crank up the standard-deviation ratio and watch Welch's degrees of freedom drift away from pooled's. When variances are similar, the two tests give nearly identical answers; when they diverge, pooled's p-value is no longer trustworthy.
            </p>
            <div className="grid lg:grid-cols-2 gap-8">
              <div className="space-y-4">
                <div className="font-mono text-[11px] small-caps grad-text">group 1</div>
                <Slider label="x̄₁" value={xbar1} onChange={setXbar1} min={50} max={90} step={0.1} />
                <Slider label="s₁" value={s1} onChange={setS1} min={1} max={30} step={0.1} />
                <Slider label="n₁" value={n1} onChange={setN1} min={3} max={80} step={1} decimals={0} />
                <div className="font-mono text-[11px] small-caps grad-text mt-6">group 2</div>
                <Slider label="x̄₂" value={xbar2} onChange={setXbar2} min={50} max={90} step={0.1} />
                <Slider label="s₂" value={s2} onChange={setS2} min={1} max={30} step={0.1} />
                <Slider label="n₂" value={n2} onChange={setN2} min={3} max={80} step={1} decimals={0} />
                <div className="mt-4 flex items-center gap-3">
                  <span className="chip">SD ratio = {fmt(sdRatio, 2)}</span>
                  {dfDiverge && <span className="chip warn">df diverged &gt; 10%</span>}
                </div>
              </div>
              <div className="grid grid-cols-2 gap-3 self-start">
                <ResultCard title="Pooled" t={pooled.t} df={pooled.df} p={pP} />
                <ResultCard title="Welch" t={welch.t} df={welch.df} p={pW} />
                {dfDiverge && (
                  <div className="col-span-2 mt-2 rounded-xl p-4 hairline" style={{ borderColor: 'var(--warn)' }}>
                    <div className="font-mono text-[11px] small-caps text-warn mb-1">heteroscedasticity warning</div>
                    <div className="text-[13.5px] text-ink/85">
                      The two groups have very different spreads. The pooled test's "shared variance" assumption is shaky here — Welch is the safer call.
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </Reveal>
      );
    }

    function ResultCard({ title, t, df, p }) {
      return (
        <div className="card-surface p-5">
          <div className="font-mono text-[11px] small-caps text-mute">{title}</div>
          <div className="mt-3 space-y-2">
            <div className="flex items-baseline justify-between">
              <span className="font-mono text-[11px] text-mute small-caps">t</span>
              <span className="font-display text-[24px] text-ink-strong"><AnimatedNumber value={t} decimals={3} /></span>
            </div>
            <div className="flex items-baseline justify-between">
              <span className="font-mono text-[11px] text-mute small-caps">df</span>
              <span className="font-mono text-[14px]"><AnimatedNumber value={df} decimals={2} /></span>
            </div>
            <div className="flex items-baseline justify-between">
              <span className="font-mono text-[11px] text-mute small-caps">p (two-sided)</span>
              <span className="font-mono text-[14px] grad-text"><AnimatedNumber value={p} decimals={4} /></span>
            </div>
          </div>
        </div>
      );
    }

    /* ============================================================
       PAIRED VS UNPAIRED DEMO
       ============================================================ */

    function PairedDemo() {
      const before = [78, 82, 65, 91, 73, 88, 70, 79];
      const after  = [85, 88, 70, 95, 78, 90, 76, 83];
      const [paired, setPaired] = useState(true);
      const pairedR = pairedStats({ before, after });
      const indepR = indepStats({ a: before, b: after });
      const shown = paired ? pairedR : indepR;
      const pShown = pValue(shown.t, shown.df, 'two');

      const seScale = Math.max(pairedR.se, indepR.se);
      return (
        <Reveal>
          <div className="mt-8 card-surface p-6 md:p-8">
            <div className="font-mono text-[11px] small-caps text-mute mb-3">paired vs. independent</div>
            <h3 className="font-display text-[34px] mb-3">Why pairing often wins.</h3>
            <p className="text-[15px] text-ink/80 max-w-[68ch] mb-8">
              Same eight subjects, measured twice. Treating them as paired exploits each person being their own control — which usually shrinks the standard error. Toggle to see the same data analyzed both ways.
            </p>
            <div className="flex flex-wrap gap-3 items-center mb-6">
              <div className="seg">
                <button className={paired ? 'active' : ''} onClick={() => setPaired(true)}>Paired</button>
                <button className={!paired ? 'active' : ''} onClick={() => setPaired(false)}>Independent</button>
              </div>
            </div>
            <div className="grid md:grid-cols-2 gap-6">
              <div className="space-y-4">
                <div className="grid grid-cols-3 gap-2 font-mono text-[12px]">
                  <div className="text-mute small-caps">subject</div>
                  <div className="text-mute small-caps">before</div>
                  <div className="text-mute small-caps">after</div>
                  {before.map((b, i) => (
                    <Fragment key={i}>
                      <div className="text-mute">#{i + 1}</div>
                      <div>{b}</div>
                      <div className="grad-text">{after[i]} <span className="text-mute">({after[i] - b > 0 ? '+' : ''}{after[i] - b})</span></div>
                    </Fragment>
                  ))}
                </div>
              </div>
              <div className="space-y-4">
                <div className="grid grid-cols-3 gap-3">
                  <Stat label="t" value={shown.t} decimals={3} />
                  <Stat label="df" value={shown.df} decimals={1} />
                  <Stat label="p" value={pShown} decimals={4} accent />
                </div>
                <div>
                  <div className="font-mono text-[11px] small-caps text-mute mb-3">standard error · less is more</div>
                  <div className="space-y-3">
                    <SeBar label="paired SE" value={pairedR.se} max={seScale} active={paired} />
                    <SeBar label="independent SE" value={indepR.se} max={seScale} active={!paired} />
                  </div>
                  <div className="mt-4 text-[13.5px] text-ink/80">
                    Pairing soaks up the between-subject variability that the independent test has to swallow as noise. Same signal, smaller denominator → bigger <em>t</em>.
                  </div>
                </div>
              </div>
            </div>
          </div>
        </Reveal>
      );
    }

    function SeBar({ label, value, max, active }) {
      return (
        <div>
          <div className="flex items-baseline justify-between mb-1">
            <span className="font-mono text-[11px] small-caps text-mute">{label}</span>
            <span className={`font-mono text-[13px] ${active ? 'grad-text font-semibold' : 'text-ink/70'}`}>{fmt(value, 3)}</span>
          </div>
          <div className="h-2 rounded-full bg-rule overflow-hidden">
            <div className="h-full rounded-full transition-all duration-700" style={{
              width: `${(value / max) * 100}%`,
              background: active ? 'var(--grad)' : 'var(--mute-soft)'
            }} />
          </div>
        </div>
      );
    }

    /* ============================================================
       COMPARISON TABLE
       ============================================================ */

    function ComparisonTable() {
      const rows = [
        { test: 'One-mean', when: 'one sample vs. a known number', stat: String.raw`\frac{\bar{x}-\mu_0}{s/\sqrt{n}}`, df: 'n − 1', assume: 'normal-ish, independent' },
        { test: 'Paired', when: 'same subjects, two measurements', stat: String.raw`\frac{\bar{d}}{s_d/\sqrt{n}}`, df: 'n − 1', assume: 'differences normal-ish' },
        { test: 'Pooled', when: 'two indep groups, equal variance', stat: String.raw`\frac{\bar{x}_1-\bar{x}_2}{s_p\sqrt{\tfrac{1}{n_1}+\tfrac{1}{n_2}}}`, df: 'n₁ + n₂ − 2', assume: 'normal, equal σ²' },
        { test: "Welch's", when: 'two indep groups, anything goes', stat: String.raw`\frac{\bar{x}_1-\bar{x}_2}{\sqrt{s_1^2/n_1 + s_2^2/n_2}}`, df: 'Satterthwaite', assume: 'normal, σ² may differ' }
      ];
      return (
        <section id="compare" className="section-anchor py-24 md:py-32 border-t border-rule">
          <div className="max-w-[1100px] mx-auto px-6 md:px-10">
            <SectionHeading n="07" kicker="At a glance" title="The four, side by side." lede="One last cheat sheet before the midterm." />
            <Reveal>
              <div className="mt-14 card-surface p-2 md:p-4 overflow-x-auto">
                <table className="w-full text-left text-[14px]">
                  <thead>
                    <tr className="font-mono text-[11px] small-caps text-mute">
                      <th className="p-4">test</th>
                      <th className="p-4">use when</th>
                      <th className="p-4">statistic</th>
                      <th className="p-4">df</th>
                      <th className="p-4">assumes</th>
                    </tr>
                  </thead>
                  <tbody>
                    {rows.map((r, i) => (
                      <tr key={i} className="border-t border-rule align-top">
                        <td className="p-4 font-display text-[18px] text-ink-strong whitespace-nowrap">{r.test}</td>
                        <td className="p-4 text-ink/85">{r.when}</td>
                        <td className="p-4"><Tex tex={r.stat} /></td>
                        <td className="p-4 font-mono text-[13px]">{r.df}</td>
                        <td className="p-4 text-ink/75">{r.assume}</td>
                      </tr>
                    ))}

                </table>
              </div>
            </Reveal>
          </div>
        </section>
      );
    }

    /* ============================================================
       PITFALLS / FAQ
       ============================================================ */

    const PITFALLS = [
      {
        q: "Is a small p-value the same as a large effect?",
        a: "No. With a huge n, a tiny meaningless difference can have p < 0.001. Always look at the effect size and confidence interval, not just the p-value."
      },
      {
        q: "What does \"failing to reject H₀\" actually prove?",
        a: "Nothing positive about H₀. It means the evidence isn't strong enough to rule it out — which is not the same as saying H₀ is true."
      },
      {
        q: "Should I always use Welch's instead of pooled?",
        a: "Many statisticians say yes — Welch's is robust to unequal variances and only slightly less powerful when they're equal. Pooled is only optimal in the (rare) case where variances really are equal."
      },
      {
        q: "Can I run a t-test if my data isn't normal?",
        a: "Often yes. The Central Limit Theorem rescues us when n is moderate (≥ 30 per group is a common rule of thumb). For small samples with skew, consider a non-parametric test (Wilcoxon)."
      },
      {
        q: "When does pairing hurt instead of help?",
        a: "When the within-pair correlation is near zero, pairing wastes degrees of freedom (n−1 instead of 2n−2) without reducing noise. But this is rare — usually pairs are correlated."
      },
      {
        q: "Two-sided or one-sided?",
        a: "Two-sided unless you have a directional hypothesis specified before looking at the data. One-sided after peeking at results is p-hacking."
      }
    ];

                    <div className="overflow-hidden transition-all duration-500" style={{ maxHeight: open === i ? '300px' : '0px', opacity: open === i ? 1 : 0 }}>

                    </div>

        </section>

  <script>
    // After mount: smooth scroll + GSAP entrance
    window.addEventListener('load', function () {
      var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
      // Lenis smooth scroll
      try {
        if (!reduced && window.Lenis) {
          var lenis = new window.Lenis({
            duration: 1.15,
            easing: function (x) { return Math.min(1, 1.001 - Math.pow(2, -10 * x)); },
            smoothWheel: true,
            wheelMultiplier: 1,
            touchMultiplier: 2
          });
          function raf(t) { lenis.raf(t); requestAnimationFrame(raf); }
          requestAnimationFrame(raf);
          window.__lenis = lenis;
        }
      } catch (e) { console.warn('Lenis init failed:', e); }

      // GSAP ScrollTrigger refresh after layout (React renders async)
      try {
        if (window.gsap && window.ScrollTrigger) {
          window.gsap.registerPlugin(window.ScrollTrigger);
          setTimeout(function () { window.ScrollTrigger.refresh(); }, 200);
        }
      } catch (e) {}
    });
  </script>
